<!doctype html>
<html lang='es'>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'>
  <meta name='color-scheme' content='dark'>
  <meta name='description' content='Libro digital interactivo - Feliz Cumpleaños'>
  <title>Feliz Cumpleaños Mi Niña Preciosa (AILISH)</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #090706;
      --bg-2: #19110f;
      --bg-3: #3b2a24;
      --panel: rgba(20, 14, 12, 0.82);
      --panel-border: rgba(255, 255, 255, 0.09);
      --panel-soft: rgba(255, 255, 255, 0.035);
      --text: #f8f2ec;
      --muted: rgba(248, 242, 236, 0.68);
      --accent: #f3c5a8;
      --accent-strong: #ffe3d2;
      --paper: #fbf7f0;
      --paper-shadow: rgba(34, 18, 12, 0.18);
      --page-width: 960px;
      --page-height: 540px;
      --page-gap: 24px;
      --spread-width: calc(var(--page-width) * 2 + var(--page-gap));
      --header-h: 92px;
      --footer-h: 118px;
      --book-scale: 1;
      --cover-progress: 0;
      --spread-opacity: 0;
      --turn-rotate: 0deg;
      --turn-shift-x: 0px;
      --turn-lift: 0px;
      --turn-roll: 0deg;
      --turn-scale: 1;
      --turn-shadow: 0;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: 'Segoe UI Variable', 'Aptos', 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #090706;
      color: var(--text);
    }

    body {
      position: relative;
      background:
        radial-gradient(92rem 52rem at 50% -14%, rgba(255, 226, 203, 0.22), transparent 58%),
        radial-gradient(44rem 28rem at 12% 18%, rgba(255, 255, 255, 0.045), transparent 60%),
        radial-gradient(44rem 28rem at 88% 14%, rgba(210, 138, 116, 0.14), transparent 58%),
        linear-gradient(180deg, #2e221d 0%, #120d0c 48%, #070607 100%);
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      opacity: 0.13;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.46) 0 1px, transparent 1.45px),
        radial-gradient(circle at 74% 36%, rgba(255, 255, 255, 0.22) 0 1px, transparent 1.4px);
      background-size: 190px 190px, 230px 230px;
    }

    body::after {
      background:
        radial-gradient(circle at center, transparent 54%, rgba(0, 0, 0, 0.26) 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 26%);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      isolation: isolate;
    }

    .app-shell.is-pseudo-fullscreen {
      background:
        radial-gradient(110rem 70rem at 50% -18%, rgba(255, 229, 211, 0.18), transparent 58%),
        linear-gradient(180deg, #231916 0%, #0a0909 100%);
    }

    .app-header,
    .app-footer {
      position: fixed;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      padding-left: 16px;
      padding-right: 16px;
      pointer-events: none;
      z-index: 90;
    }

    .app-header {
      top: 0;
      padding-top: max(12px, var(--safe-top));
    }

    .app-footer {
      bottom: 0;
      padding-bottom: max(14px, var(--safe-bottom));
    }

    .toolbar,
    .footer-bar {
      width: min(1120px, 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 28px;
      border: 1px solid var(--panel-border);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.01)),
        var(--panel);

      pointer-events: auto;
    }

    .toolbar {
      min-height: var(--header-h);
    }

    .footer-bar {
      min-height: var(--footer-h);
    }

    .control-cluster {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid rgba(255, 255, 255, 0.06);
      min-width: 0;
    }

    .control-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(17, 13, 12, 0.42);
      color: var(--text);
      min-width: 44px;
      height: 44px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 150ms ease, opacity 150ms ease;
      
    }

    .control-button svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    .control-button:hover,
    .control-button:focus-visible {
      opacity: 1;
      transform: translateY(-1px);
      border-color: rgba(255, 227, 213, 0.34);
      background:
        linear-gradient(180deg, rgba(255, 227, 213, 0.14), rgba(255, 255, 255, 0.03)),
        rgba(18, 14, 13, 0.54);
      outline: none;
      
    }

    .control-button:disabled {
      opacity: 0.28;
      cursor: not-allowed;
      transform: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .zoom-button {
      min-width: 64px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }

    .page-chip {
      min-width: 92px;
      padding: 0 16px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.08);
    }

    .status-cluster {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .status-text {
      max-width: min(60ch, 100%);
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .progress-track {
      width: min(360px, 100%);
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 150ms ease;
    }

    .page-selector {
      position: fixed;
      top: calc(max(12px, var(--safe-top)) + var(--header-h) + 14px);
      left: 50%;
      transform: translateX(-50%);
      width: min(720px, calc(100vw - 24px));
      max-height: min(46vh, 420px);
      padding: 16px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.01)),
        rgba(12, 10, 10, 0.9);

      overflow: auto;
      z-index: 84;
    }

    .page-selector[hidden] {
      display: none;
    }

    .selector-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }

    .selector-card {
      appearance: none;
      width: 100%;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: transform 150ms ease, opacity 150ms ease;
      text-align: left;
    }

    .selector-card:hover,
    .selector-card:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255, 227, 213, 0.34);
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .selector-card.is-active {
      border-color: rgba(255, 227, 213, 0.5);
      box-shadow: 0 0 0 1px rgba(255, 227, 213, 0.12) inset;
      background: rgba(255, 227, 213, 0.08);
    }

    .selector-preview {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 12px;
      background: #0b0908;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .selector-preview.is-cover {
      grid-template-columns: 1fr;
    }

    .selector-preview img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: linear-gradient(180deg, #fefaf2, #efe5d8);
    }

    .selector-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .selector-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .selector-caption {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .app-viewer {transform: translateZ(0); will-change: transform; backface-visibility: hidden; perspective: 1000px; 
      position: fixed;
      inset:
        calc(max(12px, var(--safe-top)) + var(--header-h) + 14px)
        0
        calc(max(14px, var(--safe-bottom)) + var(--footer-h) + 14px)
        0;
      overflow: hidden;
      touch-action: pan-y pinch-zoom;
      z-index: 10;
    }

    .app-viewer.is-zoomed {
      overflow: visible;
      touch-action: none;
    }

    .viewer-stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 12px;
      overflow: hidden;
    }

    .book-scaler {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    #zoomContainer {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--spread-width);
      height: var(--page-height);
      transform: translate(-50%, -50%);
      transform-origin: center center;
      will-change: transform;
    }

    .book-root {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--spread-width);
      height: var(--page-height);
      transform: scale(var(--book-scale));
      transform-origin: center center;
      will-change: transform;
      perspective: 3000px;
      transform-style: preserve-3d;
      user-select: none;
      -webkit-user-select: none;
    }

    .book-root::before {
      content: '';
      position: absolute;
      left: 4%;
      right: 4%;
      bottom: -46px;
      height: 90px;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(0, 0, 0, 0.52), transparent 72%);
      filter: blur(22px);
      pointer-events: none;
    }

    .book-root::after {
      content: '';
      position: absolute;
      inset: -28px -30px -20px;
      background: radial-gradient(60% 56% at 50% 48%, rgba(255, 225, 205, 0.08), transparent 70%);
      pointer-events: none;
    }

    .book-spine {
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: calc(var(--page-width) + (var(--page-gap) / 2));
      width: 38px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(33, 17, 11, 0.28), rgba(255, 255, 255, 0.14), rgba(34, 20, 13, 0.28));
      filter: blur(12px);
      pointer-events: none;
      z-index: 4;
    }

    .spread {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: var(--page-width) var(--page-width);
      gap: var(--page-gap);
      align-items: stretch;
      transform-style: preserve-3d;
    }

    .spread-current {
      z-index: 18;
      opacity: var(--spread-opacity);
      transition: opacity 140ms linear;
    }

    .spread-target {
      z-index: 8;
      opacity: 0;
      pointer-events: none;
    }

    .book-root.is-turning .spread-target {
      opacity: 1;
    }

    .page-card,
    .turn-face,
    .cover-face {
      position: relative;
      overflow: hidden;
      border-radius: 28px;
      background: linear-gradient(180deg, #fffdf8, #efe7dc);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(116, 82, 59, 0.08);
      transform-style: preserve-3d;
    }

    .page-card::before,
    .turn-face::before,
    .cover-face::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.34) 0 1px, transparent 1.45px),
        radial-gradient(circle at 72% 62%, rgba(145, 117, 96, 0.08) 0 1.15px, transparent 1.7px),
        radial-gradient(circle at 52% 36%, rgba(255, 255, 255, 0.08) 0 0.8px, transparent 1.2px);
      background-size: 140px 140px, 170px 170px, 122px 122px;
      opacity: 0.42;
      mix-blend-mode: multiply;
    }

    .page-card::after,
    .turn-face::after,
    .cover-face::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 12%, transparent 82%, rgba(70, 48, 34, 0.09));
    }

    .page-left::after {
      box-shadow: inset -18px 0 18px -16px rgba(38, 20, 12, 0.28);
    }

    .page-right::after {
      box-shadow: inset 18px 0 18px -16px rgba(38, 20, 12, 0.28);
    }

    .page-media,
    .turn-media,
    .cover-media {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #fffdf9, #efe4d7);
    }

    .page-media img,
    .turn-media img,
    .cover-media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: linear-gradient(180deg, #fffdf9, #efe4d7);
    }

    .page-card.is-empty img,
    .turn-face.is-empty img,
    .cover-face.is-empty img {
      opacity: 0;
    }

    .spread-current[data-hide-side='left'] .page-left,
    .spread-current[data-hide-side='right'] .page-right {
      opacity: 0;
    }

    .turn-layer {
      position: absolute;
      top: 0;
      width: var(--page-width);
      height: var(--page-height);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transform-style: preserve-3d;
    }

    .turn-layer[data-direction='forward'] {
      left: calc(var(--page-width) + var(--page-gap));
    }

    .turn-layer[data-direction='backward'] {
      left: 0;
    }

    .book-root.is-turning .turn-layer {
      opacity: 1;
    }

    .turn-card {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .turn-layer[data-direction='forward'] .turn-card {
      transform-origin: left center;
    }

    .turn-layer[data-direction='backward'] .turn-card {
      transform-origin: right center;
    }

    .turn-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      box-shadow:
        0 20px calc(28px + var(--turn-shadow) * 18px) rgba(0, 0, 0, calc(0.16 + var(--turn-shadow) * 0.22)),
        inset 0 0 0 1px rgba(116, 82, 59, 0.08);
    }

    .turn-face.back {
      transform: rotateY(180deg);
    }

    .turn-layer[data-direction='forward'] .turn-card,
    .turn-layer[data-direction='backward'] .turn-card {
      transform:
        translate3d(var(--turn-shift-x), calc(var(--turn-lift) * -0.22), var(--turn-lift))
        rotateX(var(--turn-roll))
        rotateY(var(--turn-rotate))
        scaleX(var(--turn-scale));
    }

    .cover-sheet {
      position: absolute;
      top: 0;
      left: calc((var(--spread-width) - var(--page-width)) / 2);
      width: var(--page-width);
      height: var(--page-height);
      z-index: 34;
      transform-style: preserve-3d;
      transform-origin: left center;
      transform:
        translate3d(calc((var(--page-width) / 2 + var(--page-gap) / 2) * var(--cover-progress)), 0, calc(26px * var(--cover-progress)))
        rotateY(calc(var(--cover-progress) * -180deg));
      opacity: calc(1 - var(--cover-progress) * 0.98);
      will-change: transform, opacity;
      cursor: pointer;
      border: 0;
      padding: 0;
      background: transparent;
      outline: none;
    }

    .book-root[data-cover-hidden='true'] .cover-sheet {
      pointer-events: none;
    }

    .cover-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.24),
        inset 0 0 0 1px rgba(116, 82, 59, 0.08);
    }

    .cover-face::after {
      background:
        linear-gradient(108deg, rgba(255, 255, 255, 0.12), transparent 18%, transparent 70%, rgba(255, 255, 255, 0.04)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06), transparent 16%, transparent 84%, rgba(35, 21, 14, 0.08));
    }

    .cover-face.back {
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #fffdf7, #f1e7d9);
    }

    .cover-face.back img {
      opacity: 0;
    }

    .app-shell.is-fullscreen .toolbar,
    .app-shell.is-fullscreen .footer-bar,
    .app-shell.is-pseudo-fullscreen .toolbar,
    .app-shell.is-pseudo-fullscreen .footer-bar {
      box-shadow:
        0 22px 58px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .app-shell.is-fullscreen.is-controls-hidden .toolbar,
    .app-shell.is-fullscreen.is-controls-hidden .footer-bar,
    .app-shell.is-pseudo-fullscreen.is-controls-hidden .toolbar,
    .app-shell.is-pseudo-fullscreen.is-controls-hidden .footer-bar {
      opacity: 0;
      pointer-events: none;
      transform: translateY(0);
    }

    .app-shell.is-fullscreen.is-controls-hidden .toolbar,
    .app-shell.is-pseudo-fullscreen.is-controls-hidden .toolbar {
      transform: translateY(-100%);
    }

    .app-shell.is-fullscreen.is-controls-hidden .footer-bar,
    .app-shell.is-pseudo-fullscreen.is-controls-hidden .footer-bar {
      transform: translateY(100%);
    }

    .toolbar,
    .footer-bar {
      transition: transform 150ms ease, opacity 150ms ease;
    }

    @media (max-width: 920px) {
      :root {
        --header-h: 82px;
        --footer-h: 110px;
      }

      .toolbar,
      .footer-bar {
        border-radius: 24px;
        padding: 10px 12px;
      }

      .status-text {
        max-width: min(42ch, 100%);
      }
    }

    @media (max-width: 720px) {
      :root {
        --header-h: 78px;
        --footer-h: 108px;
      }

      .toolbar,
      .footer-bar {
        gap: 10px;
      }

      .control-button {
        min-width: 42px;
        height: 42px;
        padding: 0 12px;
      }

      .status-text {
        font-size: 11px;
      }

      .progress-track {
        width: min(260px, 100%);
      }
    }

    @media (max-width: 560px) {
      :root {
        --header-h: 76px;
        --footer-h: 112px;
      }

      .toolbar,
      .footer-bar {
        border-radius: 22px;
        gap: 8px;
      }

      .control-cluster {
        gap: 8px;
      }

      .control-group {
        gap: 6px;
      }

      .control-button span.button-label,
      .control-button span.full-text {
        display: none;
      }

      .page-chip {
        min-width: 82px;
      }

      .selector-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      :root {
        --header-h: 36px;
        --footer-h: 36px;
      }

      .app-header {
        padding-top: max(4px, var(--safe-top));
      }

      .app-footer {
        padding-bottom: max(4px, var(--safe-bottom));
      }

      .toolbar,
      .footer-bar {
        min-height: 36px;
        padding: 4px 10px;
        border-radius: 18px;
      }

      .control-button {
        min-width: 36px;
        height: 36px;
        padding: 0 10px;
      }

      .control-button svg {
        width: 16px;
        height: 16px;
      }

      .page-chip {
        min-width: 64px;
        padding: 0 10px;
        font-size: 11px;
      }

      .status-text {
        font-size: 10px;
      }

      .progress-track {
        height: 2px;
      }

      .nav-button-prev,
      .nav-button-next {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 95;
        opacity: 0.7;
        transition: opacity 200ms ease;
      }

      .nav-button-prev:hover,
      .nav-button-next:hover,
      .nav-button-prev:active,
      .nav-button-next:active {
        opacity: 1;
      }

      .nav-button-prev {
        left: 8px;
      }

      .nav-button-next {
        right: 8px;
      }

      .app-viewer {transform: translateZ(0); will-change: transform; backface-visibility: hidden; perspective: 1000px; 
        inset:
          calc(max(4px, var(--safe-top)) + 36px + 8px)
          0
          calc(max(4px, var(--safe-bottom)) + 36px + 8px)
          0;

          page,
          label: 'Portada',
          pages: [getPage(1)],
          progress: 1,
        };
      }
      return {
        page,
        label: String(page) + '-' + String(page + 1),
        pages: [getPage(page), getPage(page + 1)],
        progress: page + 1,
      };
    });

    const VIEW_PAGE_SET = new Set(VIEWS.map((view) => view.page));

    const state = {
      currentPage: 0,
      isOpen: false,
      isAnimating: false,
      zoom: 1,
      selectorOpen: false,
      isFullscreen: false,
      pseudoFullscreen: false,
      controlsVisible: true,
      controlsTimeout: null,
      viewportWidth: window.innerWidth,
      viewportHeight: window.innerHeight,
      fitScale: 1,
      transition: null,
      renderQueued: false,
      animationFrame: 0,
      suppressClickUntil: 0,
      pointers: new Map(),
      gesture: null,
      pinch: null,
      bound: false,
      selectorItems: [],
    };

    let resizeObserver = null;

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function lerp(start, end, amount) {
      return start + (end - start) * amount;
    }

    function easeInOutCubic(value) {
      if (value < 0.5) {
        return 4 * value * value * value;
      }
      return 1 - Math.pow(-2 * value + 2, 3) / 2;
    }

    function getSpread(pageNumber) {
      return {
        left: getPage(pageNumber),
        right: getPage(pageNumber + 1),
      };
    }

    function getViewMeta(pageNumber) {
      return VIEWS.find((view) => view.page === pageNumber) || VIEWS[0];
    }

    function getTargetPageForStep(direction) {
      return clamp(state.currentPage + direction * 2, 2, 10);
    }

    function getBookProgress() {
      if (!state.transition) {
        return state.isOpen ? 1 : 0;
      }
      if (state.transition.type === 'cover-open') {
        return state.transition.progress;
      }
      if (state.transition.type === 'cover-close') {
        return 1 - state.transition.progress;
      }
      return 1;
    }

    function getUiPage() {
      if (!state.transition) {
        return state.currentPage;
      }
      if (state.transition.type === 'cover-open') {
        return state.transition.progress > 0.52 ? state.transition.targetPage : 0;
      }
      if (state.transition.type === 'cover-close') {
        return state.transition.progress > 0.48 ? 0 : state.transition.fromPage;
      }
      return state.transition.progress > 0.55 ? state.transition.targetPage : state.transition.fromPage;
    }

    function applyMetrics() {
      dom.app.style.setProperty('--page-width', SETTINGS.pageWidth + 'px');
      dom.app.style.setProperty('--page-height', SETTINGS.pageHeight + 'px');
      dom.app.style.setProperty('--page-gap', SETTINGS.pageGap + 'px');
      dom.app.style.setProperty('--spread-width', SETTINGS.spreadWidth + 'px');
    }

    function buildSelector() {
      const markup = VIEWS.map((view) => {
        if (view.page === 0) {
          return [
            '<button class="selector-card" type="button" data-action="jump" data-page="0">',
            '<span class="selector-preview is-cover">',
            '<img src="' + view.pages[0].src + '" alt="Portada" loading="lazy">',
            '</span>',
            '<span class="selector-meta">',
            '<span class="selector-label">Portada</span>',
            '<span class="selector-caption">Abrir desde la cubierta</span>',
            '</span>',
            '</button>',
          ].join('');
        }
        return [
          '<button class="selector-card" type="button" data-action="jump" data-page="' + String(view.page) + '">',
          '<span class="selector-preview">',
          '<img src="' + view.pages[0].src + '" alt="Página ' + String(view.page) + '" loading="lazy">',
          '<img src="' + view.pages[1].src + '" alt="Página ' + String(view.page + 1) + '" loading="lazy">',
          '</span>',
          '<span class="selector-meta">',
          '<span class="selector-label">' + view.label + '</span>',
          '<span class="selector-caption">Vista doble</span>',
          '</span>',
          '</button>',
        ].join('');
      }).join('');
      dom.selectorGrid.innerHTML = markup;
      state.selectorItems = Array.from(dom.selectorGrid.querySelectorAll('.selector-card'));
    }

    function bindEvents() {
      if (state.bound) {
        return;
      }
      state.bound = true;
      dom.app.addEventListener('click', onAppClick);
      document.addEventListener('pointerdown', onDocumentPointerDown, { capture: true, passive: true });
      window.addEventListener('keydown', onKeyDown);
      dom.viewer.addEventListener('pointerdown', onPointerDown, { passive: true });
      dom.viewer.addEventListener('pointermove', onPointerMove, { passive: false });
      window.addEventListener('pointerup', onPointerUp, { passive: true });
      window.addEventListener('pointercancel', onPointerUp, { passive: true });
      dom.viewer.addEventListener('wheel', onWheel, { passive: false });
      document.addEventListener('fullscreenchange', onFullscreenChange);
      resizeObserver = new ResizeObserver(() => {
        measureViewer();
        scheduleRender();
      });
      resizeObserver.observe(dom.viewer);
    }

    function measureViewer() {
      const rect = dom.viewer.getBoundingClientRect();
      state.viewportWidth = rect.width || window.innerWidth;
      state.viewportHeight = rect.height || window.innerHeight;
    }

    function warmImages() {
      const warm = () => {
        PAGES.forEach((page) => {
          const img = new Image();
          img.src = page.src;
          if (typeof img.decode === 'function') {
            img.decode().catch(() => {});
          }
        });
      };
      if (typeof window.requestIdleCallback === 'function') {
        window.requestIdleCallback(warm);
      } else {
        window.setTimeout(warm, 0);
      }
    }

    function scheduleRender() {
      if (state.renderQueued) {
        return;
      }
      state.renderQueued = true;
      requestAnimationFrame(() => {
        state.renderQueued = false;
        render();
      });
    }

    function render() {
      updateScale();
      updatePages();
      updateUI();
    }

    function updateScale() {
      const bookProgress = getBookProgress();
      const neededWidth = lerp(SETTINGS.pageWidth, SETTINGS.spreadWidth, bookProgress);
      const availableWidth = Math.max(240, state.viewportWidth - SETTINGS.fitPadding);
      const availableHeight = Math.max(220, state.viewportHeight - SETTINGS.fitPadding);
      const baseScale = Math.min(availableWidth / neededWidth, availableHeight / SETTINGS.pageHeight);
      state.fitScale = clamp(baseScale, 0.18, 2.4);
      const finalScale = clamp(state.fitScale * state.zoom, 0.18, 3.6);
      dom.app.style.setProperty('--book-scale', finalScale.toFixed(5));
      
      if (state.zoom > 1) {
        dom.zoomContainer.style.transform = `translate(-50%, -50%) scale(${state.zoom})`;
      } else {
        dom.zoomContainer.style.transform = 'translate(-50%, -50%)';
        dom.zoomContainer.style.transformOrigin = 'center center';
      }
    }

    function updatePages() {
      const transition = state.transition;
      const showOpenState = state.isOpen || Boolean(transition);
      const coverProgress = transition
        ? transition.type === 'cover-open'
          ? transition.progress
          : transition.type === 'cover-close'
            ? 1 - transition.progress
            : 1
        : state.isOpen ? 1 : 0;
      const spreadOpacity = transition
        ? transition.type === 'cover-open'
          ? clamp(transition.progress * 1.08, 0, 1)
          : transition.type === 'cover-close'
            ? clamp(1 - transition.progress * 1.05, 0, 1)
            : 1
        : state.isOpen ? 1 : 0;

      dom.bookRoot.style.setProperty('--cover-progress', coverProgress.toFixed(4));
      dom.bookRoot.style.setProperty('--spread-opacity', spreadOpacity.toFixed(4));
      dom.bookRoot.dataset.coverHidden = coverProgress >= 0.999 ? 'true' : 'false';
      dom.bookRoot.classList.toggle('is-turning', transition && transition.type === 'turn');
      dom.spreadCurrent.dataset.hideSide = 'none';
      dom.turnLayer.hidden = true;
      dom.turnLayer.setAttribute('aria-hidden', 'true');
      dom.spreadTarget.setAttribute('aria-hidden', 'true');
      dom.coverSheet.setAttribute('aria-hidden', showOpenState && coverProgress >= 0.999 ? 'true' : 'false');

      applySlot(dom.coverFront, getPage(1));
      applySlot(dom.coverBack, null);

      if (!transition) {
        if (state.isOpen) {
          const stableSpread = getSpread(state.currentPage);
          applySlot(dom.currentLeft, stableSpread.left);
          applySlot(dom.currentRight, stableSpread.right);
        } else {
          const firstSpread = getSpread(2);
          applySlot(dom.currentLeft, firstSpread.left);
          applySlot(dom.currentRight, firstSpread.right);
        }
        applySlot(dom.targetLeft, null);
        applySlot(dom.targetRight, null);
        applySlot(dom.turnFront, null);
        applySlot(dom.turnBack, null);
        dom.bookRoot.style.setProperty('--turn-rotate', '0deg');
        dom.bookRoot.style.setProperty('--turn-shift-x', '0px');
        dom.bookRoot.style.setProperty('--turn-lift', '0px');
        dom.bookRoot.style.setProperty('--turn-roll', '0deg');
        dom.bookRoot.style.setProperty('--turn-scale', '1');
        dom.bookRoot.style.setProperty('--turn-shadow', '0');
        return;
      }

      if (transition.type === 'cover-open') {
        const openSpread = getSpread(transition.targetPage);
        applySlot(dom.currentLeft, openSpread.left);
        applySlot(dom.currentRight, openSpread.right);
        applySlot(dom.targetLeft, null);
        applySlot(dom.targetRight, null);
        applySlot(dom.turnFront, null);
        applySlot(dom.turnBack, null);
        return;
      }

      if (transition.type === 'cover-close') {
        const closingSpread = getSpread(transition.fromPage);
        applySlot(dom.currentLeft, closingSpread.left);
        applySlot(dom.currentRight, closingSpread.right);
        applySlot(dom.targetLeft, null);
        applySlot(dom.targetRight, null);
        applySlot(dom.turnFront, null);
        applySlot(dom.turnBack, null);
        return;
      }

      const fromSpread = getSpread(transition.fromPage);
      const toSpread = getSpread(transition.targetPage);
      const progress = transition.progress;
      const crest = Math.sin(progress * Math.PI);
      const directionLabel = transition.direction > 0 ? 'forward' : 'backward';
      const angle = transition.direction > 0 ? -180 * progress : 180 * progress;
      const shift = (transition.direction > 0 ? -1 : 1) * crest * SETTINGS.pageWidth * 0.034;
      const lift = crest * 18;
      const roll = (transition.direction > 0 ? 1 : -1) * crest * 3.6;
      const scaleX = 1 - crest * 0.024;

      applySlot(dom.currentLeft, fromSpread.left);
      applySlot(dom.currentRight, fromSpread.right);

      if (transition.direction > 0) {
        applySlot(dom.targetLeft, fromSpread.left);
        applySlot(dom.targetRight, toSpread.right);
        applySlot(dom.turnFront, fromSpread.right);
        applySlot(dom.turnBack, toSpread.left);
        dom.spreadCurrent.dataset.hideSide = progress > 0 ? 'right' : 'none';
      } else {
        applySlot(dom.targetLeft, toSpread.left);
        applySlot(dom.targetRight, fromSpread.right);
        applySlot(dom.turnFront, fromSpread.left);
        applySlot(dom.turnBack, toSpread.right);
        dom.spreadCurrent.dataset.hideSide = progress > 0 ? 'left' : 'none';
      }

      dom.turnLayer.hidden = false;
      dom.turnLayer.setAttribute('aria-hidden', 'false');
      dom.spreadTarget.setAttribute('aria-hidden', 'false');
      dom.turnLayer.dataset.direction = directionLabel;
      dom.bookRoot.style.setProperty('--turn-rotate', angle.toFixed(4) + 'deg');
      dom.bookRoot.style.setProperty('--turn-shift-x', shift.toFixed(4) + 'px');
      dom.bookRoot.style.setProperty('--turn-lift', lift.toFixed(4) + 'px');
      dom.bookRoot.style.setProperty('--turn-roll', roll.toFixed(4) + 'deg');
      dom.bookRoot.style.setProperty('--turn-scale', scaleX.toFixed(5));
      dom.bookRoot.style.setProperty('--turn-shadow', clamp(crest, 0, 1).toFixed(4));
    }

    function updateUI() {
      const uiPage = getUiPage();
      const meta = getViewMeta(uiPage);
      const canPrev = !state.isAnimating && state.isOpen;
      const canNext = !state.isAnimating && state.isOpen && state.currentPage < 10;
      const progress = uiPage === 0 ? (1 / PAGES.length) * 100 : (meta.progress / PAGES.length) * 100;
      const fullscreenOn = Boolean(document.fullscreenElement) || state.pseudoFullscreen;
      const zoomPercent = Math.round(state.zoom * 100);

      dom.app.classList.toggle('is-fullscreen', fullscreenOn);
      dom.app.classList.toggle('is-pseudo-fullscreen', state.pseudoFullscreen);
      dom.app.classList.toggle('is-controls-hidden', fullscreenOn && !state.controlsVisible);
      dom.selector.hidden = !state.selectorOpen;
      dom.selectorButton.setAttribute('aria-expanded', state.selectorOpen ? 'true' : 'false');
      dom.fullscreenButton.setAttribute('aria-pressed', fullscreenOn ? 'true' : 'false');
      dom.fullscreenLabel.textContent = fullscreenOn ? 'Salir' : 'Pantalla';
      dom.zoomIndicator.textContent = zoomPercent + '%';
      dom.pageIndicator.textContent = meta.label;
      dom.progressFill.style.width = progress.toFixed(3) + '%';
      dom.prevButton.disabled = !canPrev;
      dom.nextButton.disabled = !canNext;

      const zoomOutButton = dom.app.querySelector('[data-action="zoom-out"]');
      const zoomInButton = dom.app.querySelector('[data-action="zoom-in"]');
      zoomOutButton.disabled = state.zoom <= SETTINGS.minZoom + 0.001;
      zoomInButton.disabled = state.zoom >= SETTINGS.maxZoom - 0.001;

      dom.statusText.textContent = getStatusText();
      document.title = uiPage === 0 ? SETTINGS.title : SETTINGS.title + ' - ' + meta.label;

      state.selectorItems.forEach((item) => {
        const itemPage = Number(item.dataset.page);
        item.classList.toggle('is-active', itemPage === uiPage);
      });
    }

    function getStatusText() {
      if (state.transition) {
        if (state.transition.type === 'cover-open') {
          return 'Abriendo la vista ' + getViewMeta(state.transition.targetPage).label + '.';
        }
        if (state.transition.type === 'cover-close') {
          return 'Cerrando el libro hacia la portada.';
        }
        return 'Girando hacia ' + getViewMeta(state.transition.targetPage).label + '.';
      }
      if (!state.isOpen) {
        return 'Haz clic en la portada para abrir el libro.';
      }
      if (state.currentPage === 10) {
        return 'Última vista. Usa anterior, clic a la izquierda o swipe para regresar.';
      }
      if (state.currentPage === 2) {
        return 'Primera vista. Clic izquierda o swipe desde el borde para volver a portada.';
      }
      return 'Clic izquierda o derecha, teclado, botones o swipe desde el borde para navegar.';
    }

    function applySlot(slot, page) {
      const img = slot.querySelector('img');
      const key = page ? String(page.number) : 'empty';
      if (slot.dataset.key !== key) {
        img.src = page ? page.src : EMPTY_PIXEL;
        img.alt = page ? getPageLabel(page) : '';
        slot.dataset.key = key;
      }
      slot.classList.toggle('is-empty', !page);
      slot.setAttribute('aria-label', page ? getPageLabel(page) : 'Página vacía');
    }

    function getPageLabel(page) {
      return page && page.label ? page.label : 'Página ' + String(page.number);
    }

    function onDocumentPointerDown(event) {
      if (!state.selectorOpen) {
        return;
      }
      if (event.target.closest('#pageSelector') || event.target.closest('[data-action="toggle-selector"]')) {
        return;
      }
      state.selectorOpen = false;
      scheduleRender();
    }

    let lastTapTime = 0;
    let lastTapX = 0;
    let lastTapY = 0;

    function onAppClick(event) {
      const actionTarget = event.target.closest('[data-action]');
      if (actionTarget) {
        handleAction(actionTarget.dataset.action, actionTarget, event);
        return;
      }
      if (performance.now() < state.suppressClickUntil || state.isAnimating) {
        return;
      }
      if (!event.target.closest('#bookRoot')) {
        return;
      }
      
      const now = performance.now();
      const isDoubleTap = (now - lastTapTime) < 300 && 
                          Math.abs(event.clientX - lastTapX) < 50 && 
                          Math.abs(event.clientY - lastTapY) < 50;
      
      if (isDoubleTap) {
        lastTapTime = 0;
        const fullscreenOn = Boolean(document.fullscreenElement) || state.pseudoFullscreen;
        if (fullscreenOn) {
          const currentZoom = state.zoom;
          if (currentZoom > 1) {
            setZoom(1, event.clientX, event.clientY);
          } else {
            setZoom(2, event.clientX, event.clientY);
          }
        }
        return;
      }
      
      lastTapTime = now;
      lastTapX = event.clientX;
      lastTapY = event.clientY;
      
      const fullscreenOn = Boolean(document.fullscreenElement) || state.pseudoFullscreen;
      if (fullscreenOn) {
        toggleControls();
        return;
      }
      if (!state.isOpen) {
        openBook(2);
        return;
      }
      const rect = dom.zoomContainer.getBoundingClientRect();
      const x = event.clientX - rect.left;
      if (x <= rect.width * 0.5) {
        step(-1);
      } else {
        step(1);
      }
    }

    function toggleControls() {
      const wasVisible = state.controlsVisible;
      state.controlsVisible = !wasVisible;
      if (state.controlsTimeout) {
        clearTimeout(state.controlsTimeout);
        state.controlsTimeout = null;
      }
      if (!state.controlsVisible) {
        state.controlsTimeout = setTimeout(() => {
          state.controlsVisible = true;
          scheduleRender();
        }, 3000);
      }
      scheduleRender();
    }

    function handleAction(action, source, event) {
      if (event) {
        event.preventDefault();
      }
      switch (action) {
        case 'open-cover':
          if (!state.isOpen && !state.isAnimating) {
            openBook(2);
          }
          break;
        case 'toggle-selector':
          toggleSelector();
          break;
        case 'toggle-fullscreen':
          toggleFullscreen();
          break;
        case 'prev':
        case 'next':
        case 'zoom-in':
        case 'zoom-out':
        case 'zoom-reset':
          if (Boolean(document.fullscreenElement) || state.pseudoFullscreen) {
            state.controlsVisible = true;
            if (state.controlsTimeout) {
              clearTimeout(state.controlsTimeout);
              state.controlsTimeout = null;
            }
            scheduleRender();
          }
          if (action === 'prev') {
            step(-1);
          } else if (action === 'next') {
            step(1);
          } else if (action === 'zoom-in') {
            setZoom(state.zoom + SETTINGS.zoomStep);
          } else if (action === 'zoom-out') {
            setZoom(state.zoom - SETTINGS.zoomStep);
          } else if (action === 'zoom-reset') {
            setZoom(1);
          }
          break;
        case 'jump':
          navigateTo(Number(source.dataset.page));
          break;
      }
    }

    function toggleSelector(force) {
      const next = typeof force === 'boolean' ? force : !state.selectorOpen;
      state.selectorOpen = next;
      scheduleRender();
    }

    function setZoom(nextZoom, centerX, centerY) {
      const zoom = clamp(nextZoom, SETTINGS.minZoom, SETTINGS.maxZoom);
      if (Math.abs(zoom - state.zoom) < 0.001) {
        return;
      }
      
      if (zoom > 1 && !dom.viewer.classList.contains('is-zoomed')) {
        dom.viewer.classList.add('is-zoomed');
      } else if (zoom <= 1) {
        dom.viewer.classList.remove('is-zoomed');
        dom.zoomContainer.style.transformOrigin = 'center center';
        dom.zoomContainer.style.transform = 'translate(-50%, -50%)';
      }
      
      if (centerX !== undefined && centerY !== undefined) {
        const rect = dom.zoomContainer.getBoundingClientRect();
        const containerCenterX = rect.left + rect.width / 2;
        const containerCenterY = rect.top + rect.height / 2;
        
        const normalizedX = (centerX - containerCenterX) / (rect.width / 2);
        const normalizedY = (centerY - containerCenterY) / (rect.height / 2);
        
        const originX = 50 + normalizedX * 50;
        const originY = 50 + normalizedY * 50;
        
        dom.zoomContainer.style.transformOrigin = `${clamp(originX, 0, 100)}% ${clamp(originY, 0, 100)}%`;
      }
      
      state.zoom = zoom;
      scheduleRender();
    }

    async function toggleFullscreen() {
      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {}
        state.pseudoFullscreen = false;
        state.isFullscreen = false;
        scheduleRender();
        return;
      }
      if (state.pseudoFullscreen) {
        state.pseudoFullscreen = false;
        state.isFullscreen = false;
        scheduleRender();
        return;
      }
      if (document.fullscreenEnabled && typeof dom.app.requestFullscreen === 'function') {
        try {
          await dom.app.requestFullscreen({ navigationUI: 'hide' });
          return;
        } catch (error) {}
      }
      state.pseudoFullscreen = true;
      state.isFullscreen = true;
      scheduleRender();
    }

    function onFullscreenChange() {
      if (document.fullscreenElement) {
        state.pseudoFullscreen = false;
      }
      const wasFullscreen = state.isFullscreen;
      state.isFullscreen = Boolean(document.fullscreenElement) || state.pseudoFullscreen;
      if (!wasFullscreen && state.isFullscreen) {
        state.controlsVisible = true;
        if (state.controlsTimeout) {
          clearTimeout(state.controlsTimeout);
          state.controlsTimeout = null;
        }
      }
      measureViewer();
      scheduleRender();
    }

    function onKeyDown(event) {
      const tag = (document.activeElement && document.activeElement.tagName ? document.activeElement.tagName : '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') {
        return;
      }
      switch (event.key) {
        case 'ArrowLeft':
          event.preventDefault();
          step(-1);
          break;
        case 'ArrowRight':
          event.preventDefault();
          step(1);
          break;
        case '+':
        case '=':
          event.preventDefault();
          setZoom(state.zoom + SETTINGS.zoomStep);
          break;
        case '-':
          event.preventDefault();
          setZoom(state.zoom - SETTINGS.zoomStep);
          break;
        case '0':
          event.preventDefault();
          setZoom(1);
          break;
        case 'f':
        case 'F':
          event.preventDefault();
          toggleFullscreen();
          break;
        case 'Escape':
          if (state.selectorOpen) {
            event.preventDefault();
            state.selectorOpen = false;
            scheduleRender();
            break;
          }
          if (document.fullscreenElement || state.pseudoFullscreen) {
            event.preventDefault();
            toggleFullscreen();
          }
          break;
        case 'Home':
          if (state.isOpen) {
            event.preventDefault();
            navigateTo(2);
          }
          break;
        case 'End':
          if (state.isOpen) {
            event.preventDefault();
            navigateTo(10);
          }
          break;
      }
    }

    function onWheel(event) {
      if (!event.ctrlKey && !event.metaKey) {
        return;
      }
      event.preventDefault();
      const delta = event.deltaY > 0 ? -SETTINGS.zoomStep * 0.55 : SETTINGS.zoomStep * 0.55;
      setZoom(state.zoom + delta, event.clientX, event.clientY);
    }

    function onPointerDown(event) {
      if (state.isAnimating) {
        return;
      }
      if (event.pointerType === 'mouse' && event.button !== 0) {
        return;
      }

      state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY, type: event.pointerType });
      updatePinchState();
      if (state.pinch) {
        state.gesture = null;
        state.suppressClickUntil = performance.now() + 380;
        return;
      }

      const rect = dom.zoomContainer.getBoundingClientRect();
      if (event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom) {
        return;
      }

      const localX = event.clientX - rect.left;
      const edgeWidth = rect.width * SETTINGS.edgeRatio;
      let side = null;
      if (!state.isOpen) {
        side = 'cover';
      } else if (localX <= edgeWidth) {
        side = 'left';
      } else if (localX >= rect.width - edgeWidth) {
        side = 'right';
      }

      if (!side) {
        state.gesture = null;
        return;
      }

      state.gesture = {
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        rectWidth: rect.width,
        side,
        active: false,
        direction: 0,
        type: null,
        fromPage: state.currentPage,
        targetPage: state.currentPage,
      };

      if (typeof dom.viewer.setPointerCapture === 'function') {
        try {
          dom.viewer.setPointerCapture(event.pointerId);
        } catch (error) {}
      }
    }

    function onPointerMove(event) {
      if (state.pointers.has(event.pointerId)) {
        state.pointers.set(event.pointerId, { x: event.clientX, y: event.clientY, type: event.pointerType });
      }

      if (state.pinch && state.pointers.size >= 2) {
        const zoom = state.pinch.startZoom * (getPinchDistance() / Math.max(1, state.pinch.startDistance));
        setZoom(zoom);
        state.suppressClickUntil = performance.now() + 420;
        event.preventDefault();
        return;
      }

      if (!state.gesture || state.gesture.pointerId !== event.pointerId) {
        return;
      }

      const dx = event.clientX - state.gesture.startX;
      const dy = event.clientY - state.gesture.startY;

      if (!state.gesture.active) {
        if (Math.abs(dx) < SETTINGS.dragThreshold || Math.abs(dx) < Math.abs(dy)) {
          return;
        }
        const activation = resolveGestureActivation(state.gesture.side, dx);
        if (!activation) {
          state.gesture = null;
          return;
        }
        beginTransition({
          type: activation.type,
          direction: activation.direction,
          fromPage: activation.fromPage,
          targetPage: activation.targetPage,
          progress: 0,
          interactive: true,
        });
        state.gesture.active = true;
        state.gesture.direction = activation.direction;
        state.gesture.type = activation.type;
        state.gesture.fromPage = activation.fromPage;
        state.gesture.targetPage = activation.targetPage;
        state.suppressClickUntil = performance.now() + 420;
      }

      const progress = computeGestureProgress(state.gesture, dx);
      if (state.transition) {
        state.transition.progress = progress;
        scheduleRender();
      }
      event.preventDefault();
    }

    function onPointerUp(event) {
      state.pointers.delete(event.pointerId);
      
      if (state.pinch && state.pointers.size < 2) {
        state.pinch = null;
        return;
      }
      
      updatePinchState();

      if (!state.gesture || state.gesture.pointerId !== event.pointerId) {
        return;
      }

      if (!state.gesture.active) {
        state.gesture = null;
        return;
      }

      const progress = state.transition ? state.transition.progress : 0;
      const commit = progress >= SETTINGS.dragCommit;
      const durationBase = state.transition && state.transition.type === 'turn'
        ? SETTINGS.turnDuration
        : state.transition && state.transition.type === 'cover-close'
          ? SETTINGS.closeDuration
          : SETTINGS.coverDuration;
      const delta = commit ? 1 - progress : progress;
      const duration = Math.max(160, durationBase * Math.max(0.22, delta));
      animateTransitionTo(commit ? 1 : 0, duration);
      state.gesture = null;
      state.suppressClickUntil = performance.now() + 420;
    }

    function resolveGestureActivation(side, dx) {
      if (side === 'cover' && dx < -SETTINGS.dragThreshold) {
        return {
          type: 'cover-open',
          direction: 1,
          fromPage: 0,
          targetPage: 2,
        };
      }
      if (side === 'right' && dx < -SETTINGS.dragThreshold && state.isOpen && state.currentPage < 10) {
        return {
          type: 'turn',
          direction: 1,
          fromPage: state.currentPage,
          targetPage: getTargetPageForStep(1),
        };
      }
      if (side === 'left' && dx > SETTINGS.dragThreshold && state.isOpen) {
        if (state.currentPage === 2) {
          return {
            type: 'cover-close',
            direction: -1,
            fromPage: state.currentPage,
            targetPage: 0,
          };
        }
        return {
          type: 'turn',
          direction: -1,
          fromPage: state.currentPage,
          targetPage: getTargetPageForStep(-1),
        };
      }
      return null;
    }

    function computeGestureProgress(gesture, dx) {
      const turnWidth = gesture.rectWidth * 0.58;
      if (gesture.direction > 0) {
        return clamp((-dx) / Math.max(1, turnWidth), 0, 1);
      }
      return clamp(dx / Math.max(1, turnWidth), 0, 1);
    }

    function updatePinchState() {
      if (state.pointers.size < 2) {
        state.pinch = null;
        return;
      }
      const points = Array.from(state.pointers.values());
      if (!state.pinch) {
        const rect = dom.zoomContainer.getBoundingClientRect();
        const centerX = (points[0].x + points[1].x) / 2;
        const centerY = (points[0].y + points[1].y) / 2;
        
        const containerCenterX = rect.left + rect.width / 2;
        const containerCenterY = rect.top + rect.height / 2;
        
        const normalizedX = (centerX - containerCenterX) / (rect.width / 2);
        const normalizedY = (centerY - containerCenterY) / (rect.height / 2);
        
        const originX = 50 + normalizedX * 50;
        const originY = 50 + normalizedY * 50;
        
        dom.zoomContainer.style.transformOrigin = `${clamp(originX, 0, 100)}% ${clamp(originY, 0, 100)}%`;
        
        state.pinch = {
          startDistance: getDistance(points[0], points[1]),
          startZoom: state.zoom,
        };
      }
    }

    function getPinchDistance() {
      const points = Array.from(state.pointers.values());
      if (points.length < 2) {
        return 0;
      }
      return getDistance(points[0], points[1]);
    }

    function getDistance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function beginTransition(transition) {
      cancelAnimation();
      state.transition = transition;
      state.isAnimating = true;
      scheduleRender();
    }

    function cancelAnimation() {
      if (state.animationFrame) {
        cancelAnimationFrame(state.animationFrame);
        state.animationFrame = 0;
      }
    }

    function animateTransitionTo(target, duration) {
      const transition = state.transition;
      if (!transition) {
        return;
      }
      cancelAnimation();
      const start = transition.progress;
      const delta = target - start;
      const startedAt = performance.now();

      const frame = (now) => {
        if (!state.transition || state.transition !== transition) {
          state.animationFrame = 0;
          return;
        }
        const raw = clamp((now - startedAt) / Math.max(1, duration), 0, 1);
        transition.progress = start + delta * easeInOutCubic(raw);
        scheduleRender();
        if (raw < 1) {
          state.animationFrame = requestAnimationFrame(frame);
          return;
        }
        state.animationFrame = 0;
        transition.progress = target;
        scheduleRender();
        if (target >= 1) {
          commitTransition();
        } else {
          cancelTransition();
        }
      };

      state.animationFrame = requestAnimationFrame(frame);
    }

    function commitTransition() {
      if (!state.transition) {
        return;
      }
      const transition = state.transition;
      cancelAnimation();
      if (transition.type === 'cover-open') {
        state.currentPage = transition.targetPage;
        state.isOpen = true;
      } else if (transition.type === 'cover-close') {
        state.currentPage = 0;
        state.isOpen = false;
      } else {
        state.currentPage = transition.targetPage;
        state.isOpen = true;
      }
      state.transition = null;
      state.isAnimating = false;
      state.gesture = null;
      scheduleRender();
    }

    function cancelTransition() {
      cancelAnimation();
      state.transition = null;
      state.isAnimating = false;
      state.gesture = null;
      scheduleRender();
    }

    function openBook(targetPage) {
      if (state.isAnimating || state.isOpen) {
        return;
      }
      const page = VIEW_PAGE_SET.has(targetPage) && targetPage !== 0 ? targetPage : 2;
      state.selectorOpen = false;
      beginTransition({
        type: 'cover-open',
        direction: 1,
        fromPage: 0,
        targetPage: page,
        progress: 0,
        interactive: false,
      });
      animateTransitionTo(1, SETTINGS.coverDuration);
    }

    function closeBook() {
      if (state.isAnimating || !state.isOpen || state.currentPage !== 2) {
        return;
      }
      state.selectorOpen = false;
      beginTransition({
        type: 'cover-close',
        direction: -1,
        fromPage: state.currentPage,
        targetPage: 0,
        progress: 0,
        interactive: false,
      });
      animateTransitionTo(1, SETTINGS.closeDuration);
    }

    function step(direction) {
      if (state.isAnimating) {
        return;
      }
      if (!state.isOpen) {
        if (direction > 0) {
          openBook(2);
        }
        return;
      }
      if (direction < 0 && state.currentPage === 2) {
        closeBook();
        return;
      }
      if (direction > 0 && state.currentPage >= 10) {
        return;
      }
      const targetPage = getTargetPageForStep(direction);
      if (targetPage === state.currentPage) {
        return;
      }
      state.selectorOpen = false;
      beginTransition({
        type: 'turn',
        direction,
        fromPage: state.currentPage,
        targetPage,
        progress: 0,
        interactive: false,
      });
      animateTransitionTo(1, SETTINGS.turnDuration);
    }

    function navigateTo(targetPage) {
      if (state.isAnimating || !VIEW_PAGE_SET.has(targetPage)) {
        return;
      }
      state.selectorOpen = false;
      if (targetPage === state.currentPage) {
        scheduleRender();
        return;
      }
      if (!state.isOpen) {
        if (targetPage === 0) {
          scheduleRender();
          return;
        }
        openBook(targetPage);
        return;
      }
      if (targetPage === 0) {
        if (state.currentPage === 2) {
          closeBook();
        } else {
          state.currentPage = 0;
          state.isOpen = false;
          scheduleRender();
        }
        return;
      }
      if (Math.abs(targetPage - state.currentPage) === 2) {
        step(targetPage > state.currentPage ? 1 : -1);
        return;
      }
      state.currentPage = targetPage;
      state.isOpen = true;
      scheduleRender();
    }

    function init() {
      applyMetrics();
      buildSelector();
      bindEvents();
      measureViewer();
      onFullscreenChange();
      scheduleRender();
      warmImages();
    }

    init();
  </script>
</body>
</html>
